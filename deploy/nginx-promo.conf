# Nginx reverse proxy — promo-achados.
# A API ouve em 127.0.0.1:8000 (HOST=127.0.0.1 no .env); o Nginx termina TLS.
#
# Instalar:
#   sudo cp deploy/nginx-promo.conf /etc/nginx/sites-available/promo
#   sudo ln -s /etc/nginx/sites-available/promo /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d SEU_DOMINIO     # gera o certificado e reescreve p/ 443
#
# HTTPS é OBRIGATÓRIO: o painel usa Basic Auth (senha em base64, não-cifrada).

server {
    listen 80;
    server_name SEU_DOMINIO;
    # Após `certbot --nginx`, este bloco passa a escutar 443 (TLS) e o 80 redireciona.

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- CORS: PALIATIVO ---
        # O app sobe com allow_origins=["*"] no main.py. Aqui reescrevemos o header
        # na borda p/ aceitar só o teu domínio. É contorno de infra, não solução:
        # ver TODO em DEPLOY_STEPS.md (mover o CORS p/ o FastAPI via env).
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "https://SEU_DOMINIO" always;
    }
}
